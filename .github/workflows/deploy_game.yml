name: Monorepo CI/CD

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - mobile/**
      - .github/workflows/deploy_game.yml
  pull_request:
    branches: [main]
    paths:
      - backend/**
      - mobile/**
      - .github/workflows/deploy_game.yml
  workflow_dispatch:

concurrency:
  group: monorepo-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changed Areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            mobile:
              - 'mobile/**'

  validate-backend:
    name: Validate Node Backend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check backend
        run: find . -name '*.js' -not -path './node_modules/*' -print0 | xargs -0 -n1 node --check

      - name: Run backend tests
        run: npm test

      - name: Package backend artifact
        run: |
          tar -czf backend-package.tgz \
            app.js \
            package.json \
            package-lock.json \
            assets \
            config \
            controllers \
            middleware \
            models \
            routes \
            scripts \
            services

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: heroes-of-waterdeep-backend
          path: backend/backend-package.tgz
          if-no-files-found: error
          overwrite: true

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.mobile == 'true' || github.event_name == 'workflow_dispatch'
    env:
      CI: 1
      EXPO_NO_TELEMETRY: 1
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Create root env for mobile build
        shell: bash
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL }}
          EXPO_ANDROID_PACKAGE: ${{ vars.EXPO_ANDROID_PACKAGE }}
          EXPO_IOS_BUNDLE_IDENTIFIER: ${{ vars.EXPO_IOS_BUNDLE_IDENTIFIER }}
        run: |
          test -n "$EXPO_PUBLIC_API_URL" || { echo "Missing GitHub Actions variable: EXPO_PUBLIC_API_URL"; exit 1; }
          test -n "$EXPO_ANDROID_PACKAGE" || { echo "Missing GitHub Actions variable: EXPO_ANDROID_PACKAGE"; exit 1; }
          test -n "$EXPO_IOS_BUNDLE_IDENTIFIER" || { echo "Missing GitHub Actions variable: EXPO_IOS_BUNDLE_IDENTIFIER"; exit 1; }
          {
            echo "EXPO_PUBLIC_API_URL=${EXPO_PUBLIC_API_URL}"
            echo "EXPO_ANDROID_PACKAGE=${EXPO_ANDROID_PACKAGE}"
            echo "EXPO_IOS_BUNDLE_IDENTIFIER=${EXPO_IOS_BUNDLE_IDENTIFIER}"
          } > ../.env

      - name: Install dependencies
        run: npm ci

      - name: Lint app
        run: npm run lint

      - name: Generate native Android project
        run: npx expo prebuild --platform android

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: heroes-of-waterdeep-android-apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          overwrite: true

  build-ios:
    name: Build iOS App
    runs-on: macos-latest
    needs: changes
    if: needs.changes.outputs.mobile == 'true' || github.event_name == 'workflow_dispatch'
    env:
      CI: 1
      EXPO_NO_TELEMETRY: 1
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Create root env for mobile build
        shell: bash
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL }}
          EXPO_ANDROID_PACKAGE: ${{ vars.EXPO_ANDROID_PACKAGE }}
          EXPO_IOS_BUNDLE_IDENTIFIER: ${{ vars.EXPO_IOS_BUNDLE_IDENTIFIER }}
        run: |
          test -n "$EXPO_PUBLIC_API_URL" || { echo "Missing GitHub Actions variable: EXPO_PUBLIC_API_URL"; exit 1; }
          test -n "$EXPO_ANDROID_PACKAGE" || { echo "Missing GitHub Actions variable: EXPO_ANDROID_PACKAGE"; exit 1; }
          test -n "$EXPO_IOS_BUNDLE_IDENTIFIER" || { echo "Missing GitHub Actions variable: EXPO_IOS_BUNDLE_IDENTIFIER"; exit 1; }
          {
            echo "EXPO_PUBLIC_API_URL=${EXPO_PUBLIC_API_URL}"
            echo "EXPO_ANDROID_PACKAGE=${EXPO_ANDROID_PACKAGE}"
            echo "EXPO_IOS_BUNDLE_IDENTIFIER=${EXPO_IOS_BUNDLE_IDENTIFIER}"
          } > ../.env

      - name: Install dependencies
        run: npm ci

      - name: Lint app
        run: npm run lint

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build iOS without codesign
        run: |
          xcodebuild \
            -workspace ios/HeroesOfWaterdeep.xcworkspace \
            -scheme HeroesOfWaterdeep \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO

      - name: Package iOS artifact
        run: |
          cd ios/build/Build/Products/Release-iphoneos
          mkdir Payload
          APP_NAME=$(find . -maxdepth 1 -name '*.app' -type d | head -n 1)
          mv "$APP_NAME" Payload/
          zip -r HeroesOfWaterdeep-no-codesign.ipa Payload

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: heroes-of-waterdeep-ios-ipa
          path: mobile/ios/build/Build/Products/Release-iphoneos/HeroesOfWaterdeep-no-codesign.ipa
          if-no-files-found: error
          overwrite: true
